<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOYD | Short Video Sharing</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .upload-section { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        video { width: 100%; border-radius: 10px; margin-top: 15px; background: black; }
        .video-card { margin-bottom: 50px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        button { background: #00d1b2; border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; }
        input[type="file"] { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>VOYD</h1>

        <div class="upload-section">
            <h3>Post a Vine</h3>
            <input type="file" id="videoInput" accept="video/mp4,video/mov">
            <button onclick="uploadVideo()">Upload</button>
            <p id="status"></p>
        </div>

        <div id="feed">
            <p>Loading the vibe...</p>
        </div>
    </div>

    <script>
        // REPLACE THIS with your Ngrok or Cloudflare Tunnel URL
        const API_URL = "quizzlyapi.kyklos.online"; 

        // 1. Fetch and Display Videos
        async function loadFeed() {
            try {
                const response = await fetch(`${API_URL}/feed`);
                const videoFiles = await response.json();
                const feedElement = document.getElementById('feed');
                feedElement.innerHTML = '';

                if (videoFiles.length === 0) {
                    feedElement.innerHTML = '<p>No videos yet. Be the first!</p>';
                    return;
                }

                videoFiles.forEach(filename => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <video controls loop muted autoplay>
                            <source src="${API_URL}/videos/${filename}" type="video/mp4">
                        </video>
                        <p>${filename}</p>
                    `;
                    feedElement.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('feed').innerHTML = '<p>Server offline. Is your computer running?</p>';
            }
        }

        // 2. Handle Video Upload
        async function uploadVideo() {
            const fileInput = document.getElementById('videoInput');
            const status = document.getElementById('status');
            
            if (!fileInput.files[0]) return alert("Select a video first!");

            const formData = new FormData();
            formData.append('video', fileInput.files[0]);

            status.innerText = "Uploading...";

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    status.innerText = "Upload complete!";
                    fileInput.value = ''; // Reset input
                    loadFeed(); // Refresh feed
                } else {
                    status.innerText = "Upload failed.";
                }
            } catch (err) {
                status.innerText = "Error connecting to server.";
            }
        }

        // Load feed on start
        loadFeed();
    </script>
</body>
</html>
